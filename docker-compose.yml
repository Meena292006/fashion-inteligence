services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: styleai-backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/backend/uploads
      - db_data:/app/backend/fashion_intelligence.db
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    container_name: styleai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
  chroma_data:
